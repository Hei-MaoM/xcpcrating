name: Deploy data site to Pages

# Build the static xcpc-rating data site and publish it to GitHub Pages.
# The exporter replays the incremental-ladder backtest (the single scoring rule)
# over the official srk-collection and emits the JSON contract the Vite/React
# frontend consumes (both the all-participation and official-only boards).

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow only one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Shallow-clone the official srk-collection
        run: |
          git clone --depth 1 https://github.com/algoux/srk-collection /tmp/srk-collection

      - name: Export the static data bundle
        run: |
          PYTHONPATH=src python -m xcpc_rating.export_web \
            --data /tmp/srk-collection/official \
            --out  web/public/data

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build the frontend
        working-directory: web
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
